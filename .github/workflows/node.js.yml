# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 25.8.1]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm test
    - name: Validate publishable tarball contents
      run: |
        npm pack --dry-run --json | tee npm-pack-dry-run.json
        node -e "const fs=require('fs'); const report=JSON.parse(fs.readFileSync('npm-pack-dry-run.json','utf8')); const files=(report?.[0]?.files||[]).map(f=>f.path); const required=['dist/','bin/']; const missing=required.filter(req => !files.some(file => file===req || file.startsWith(req))); if(missing.length){ console.error('Missing required packaged paths:', missing.join(', ')); process.exit(1); } console.log('Verified required packaged paths:', required.join(', '));"
    - name: Upload npm pack dry-run report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: npm-pack-dry-run-${{ matrix.node-version }}
        path: npm-pack-dry-run.json
